<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Vue 3 | Home</title>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="./style.css" />
  </head>

  <body>
    <header class="header">
      <nav>
        <a class="alink" href="#">Index page</a>
      </nav>
    </header>


    <main >
      <div id="app">
        <div class="topic-name">
          <h1 class="logo">{{ title }}</h1>

          <div class="cart">Cart({{cart.length}})</div>
        </div>
        <h1> there </h1>

        <!-- product card -->
        <product-display
          :welcome="welcome"
          :premium="premium"
          :cart="cart"
          @add-to-cart="addToCart"
        >
        </product-display>

      </div>

     
    </main>

    <script src="./main.js"></script>

    <!-- import The display-product component -->

    <script src="./Components/productDisplay.js"></script>
    <script src="./Components/productDetails.js"></script>
    <script src="./Components/reviewForm.js"></script>
    <script src="./Components/reviewList.js"></script>

    <script>
      app.mount("#app");
    </script>
  </body>
</html>
